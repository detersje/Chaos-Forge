<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chaos Forge</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin:0; font-family: monospace; background:#111; color:#0f0; text-align:center; overflow-y:auto; }
        #screen { max-width:100%; margin:auto; padding:10px; }
        button { background:#222; color:#0f0; border:2px solid #0f0; padding:12px 20px; margin:8px; font-size:18px; width:90%; max-width:320px; }
        canvas { image-rendering: pixelated; border:2px solid #0f0; background:#000; max-width:100%; }
        .hidden { display:none; }
        input { background:#222; color:#0f0; border:2px solid #0f0; padding:10px; font-size:16px; width:80%; }
    </style>
</head>
<body>
<div id="screen">
    <h1>🔥 CHAOS FORGE 🔥</h1>
    <p>Truly Random Daily Break • 20-30 min</p>

    <!-- Avatar Screen -->
    <div id="avatarScreen">
        <h2>Customize Your Pixel Avatar</h2>
        <canvas id="avatarCanvas" width="160" height="160"></canvas><br>
        <button onclick="randomizeAvatar()">Randomize Avatar</button>
        <button onclick="saveAvatar()">Save Avatar & Continue</button>
    </div>

    <!-- Main Menu -->
    <div id="mainMenu" class="hidden">
        <button onclick="startDailyEvent()">Forge Today's Chaos</button>
        <button onclick="showAvatar()">Customize Avatar</button>
        <button onclick="showPremium()">Go Premium (Unlimited Events)</button>
    </div>

    <!-- Game Container -->
    <div id="gameContainer" class="hidden">
        <h2 id="eventTitle"></h2>
        <canvas id="gameCanvas" width="320" height="320"></canvas>
        <div id="gameUI"></div>
        <button onclick="endEvent()">End Event & Return</button>
    </div>

    <p id="status"></p>
</div>

<script>
// ============== SUPABASE CONFIG (YOUR KEYS) ==============
const SUPABASE_URL = 'https://rsswlyvuypjcwjbijvmk.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJzc3dseXZ1eXBqY3dqYmlqdm1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NTk1ODgsImV4cCI6MjA5MDUzNTU4OH0.kkftjqq-SouvplCuCSXufMysioQUPrCRuDPaGj17IgE';

const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ============== GLOBAL STATE ==============
let userId = null;
let avatarData = { headColor: '#fdb', bodyColor: '#0f0', hat: 0 };
let today = new Date().toISOString().split('T')[0];

// ============== AVATAR ==============
const avCanvas = document.getElementById('avatarCanvas');
const avCtx = avCanvas.getContext('2d');

function drawAvatar() {
    avCtx.fillStyle = '#000'; avCtx.fillRect(0,0,160,160);
    // head
    avCtx.fillStyle = avatarData.headColor; avCtx.fillRect(56,32,48,48);
    // body
    avCtx.fillStyle = avatarData.bodyColor; avCtx.fillRect(48,80,64,64);
    // eyes
    avCtx.fillStyle = '#000'; avCtx.fillRect(68,48,8,12); avCtx.fillRect(84,48,8,12);
    // hat
    if (avatarData.hat) {
        avCtx.fillStyle = '#f00'; avCtx.fillRect(48,20,64,20);
    }
}

function randomizeAvatar() {
    avatarData.headColor = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');
    avatarData.bodyColor = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');
    avatarData.hat = Math.random() > 0.5 ? 1 : 0;
    drawAvatar();
}

async function saveAvatar() {
    if (!userId) {
        const { data } = await supabase.auth.signInAnonymously();
        userId = data.user.id;
    }
    await supabase.from('avatars').upsert({
        user_id: userId,
        data: avatarData,
        updated_at: new Date().toISOString()
    });
    document.getElementById('avatarScreen').classList.add('hidden');
    document.getElementById('mainMenu').classList.remove('hidden');
    drawAvatar();
}

// ============== DAILY EVENT LOGIC (No Repeats + 1 Free/Day) ==============
const eventTypes = [
    {name: "Sudoku", time: "20 min", fn: startSudoku},
    {name: "Word Find", time: "20 min", fn: startWordFind},
    {name: "RPG Battle", time: "20 min", fn: startRPGBattle},
    {name: "Slice of Life", time: "25 min", fn: startStory},
    {name: "Skill Lesson", time: "15 min", fn: startSkill},
    {name: "Riddle", time: "15 min", fn: startRiddle},
    {name: "Language Flash", time: "20 min", fn: startLanguage},
    {name: "Meme Match", time: "15 min", fn: startMeme},
    {name: "Funny Game", time: "20 min", fn: startFunnyGame}
];

async function startDailyEvent() {
    if (!userId) {
        const { data } = await supabase.auth.signInAnonymously();
        userId = data.user.id;
    }

    // Check today's event
    const { data: todayEvent } = await supabase
        .from('daily_events')
        .select('*')
        .eq('user_id', userId)
        .eq('date', today)
        .single();

    if (todayEvent && !todayEvent.premium) {
        document.getElementById('status').textContent = 'You already used your free event today. Come back tomorrow!';
        return;
    }

    // Pick random unused event
    let chosen = null;
    const { data: used } = await supabase.from('used_events').select('event_name').eq('user_id', userId);
    const usedNames = used ? used.map(u => u.event_name) : [];

    let attempts = 0;
    while (!chosen && attempts < 20) {
        chosen = eventTypes[Math.floor(Math.random() * eventTypes.length)];
        if (!usedNames.includes(chosen.name)) break;
        chosen = null;
        attempts++;
    }
    if (!chosen) chosen = eventTypes[0]; // fallback

    // Record usage
    await supabase.from('daily_events').upsert({
        user_id: userId,
        date: today,
        event_name: chosen.name,
        premium: false
    });
    await supabase.from('used_events').insert({ user_id: userId, event_name: chosen.name });

    // Start game
    document.getElementById('mainMenu').classList.add('hidden');
    document.getElementById('gameContainer').classList.remove('hidden');
    document.getElementById('eventTitle').textContent = `${chosen.name} • ${chosen.time}`;
    document.getElementById('gameUI').innerHTML = '';
    chosen.fn();
}

// ============== MINI GAMES (3 full + 6 placeholders) ==============
function startSudoku() {
    const ctx = document.getElementById('gameCanvas').getContext('2d');
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,320,320);
    ctx.strokeStyle = '#0f0'; ctx.lineWidth = 3;
    for (let i = 0; i <= 9; i++) {
        ctx.beginPath();
        ctx.moveTo(20 + i*30, 20);
        ctx.lineTo(20 + i*30, 290);
        ctx.moveTo(20, 20 + i*30);
        ctx.lineTo(290, 20 + i*30);
        ctx.stroke();
    }
    ctx.fillStyle = '#0f0'; ctx.font = 'bold 18px monospace';
    ctx.fillText('Simple Sudoku', 60, 180);
    document.getElementById('gameUI').innerHTML = '<p>Tap numbers to fill (demo version). Full generator on request.</p>';
}

function startRPGBattle() {
    const ctx = document.getElementById('gameCanvas').getContext('2d');
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,320,320);
    // Your avatar
    ctx.fillStyle = avatarData.bodyColor; ctx.fillRect(80,180,50,70);
    ctx.fillStyle = avatarData.headColor; ctx.fillRect(88,140,34,40);
    // Enemy
    ctx.fillStyle = '#f33'; ctx.fillRect(200,160,60,60);
    document.getElementById('gameUI').innerHTML = `
        <button onclick="alert('Attack!')">Attack</button>
        <button onclick="alert('Defend!')">Defend</button>
        <p>Your avatar vs enemy. Win in \~15 turns.</p>
    `;
}

function startRiddle() {
    document.getElementById('gameUI').innerHTML = `
        <p>What has keys but can't open locks?</p>
        <input type="text" id="riddleAnswer" placeholder="Your answer">
        <button onclick="checkRiddle()">Submit</button>
    `;
}
window.checkRiddle = function() {
    const ans = document.getElementById('riddleAnswer').value.toLowerCase();
    if (ans.includes('piano') || ans.includes('keyboard')) alert('Correct!');
    else alert('Not quite. Try again or end event.');
};

// Placeholders for remaining events
function startWordFind(){ document.getElementById('gameUI').innerHTML = '<p>Word Find grid (full version on request)</p>'; }
function startStory(){ document.getElementById('gameUI').innerHTML = '<p>Story choice begins...</p>'; }
function startSkill(){ document.getElementById('gameUI').innerHTML = '<p>Quick skill lesson + quiz</p>'; }
function startLanguage(){ document.getElementById('gameUI').innerHTML = '<p>Language flash cards</p>'; }
function startMeme(){ document.getElementById('gameUI').innerHTML = '<p>Meme matching game</p>'; }
function startFunnyGame(){ document.getElementById('gameUI').innerHTML = '<p>Tap the chaos!</p>'; }

// ============== UTILS ==============
function endEvent() {
    document.getElementById('gameContainer').classList.add('hidden');
    document.getElementById('mainMenu').classList.remove('hidden');
    document.getElementById('status').textContent = 'Progress saved. New chaos tomorrow!';
}

function showAvatar() {
    document.getElementById('mainMenu').classList.add('hidden');
    document.getElementById('avatarScreen').classList.remove('hidden');
    drawAvatar();
}

function showPremium() {
    alert('Premium coming: $4.99/month or $29 one-time via Stripe.\nUnlock unlimited daily events.');
}

// ============== INIT ==============
async function init() {
    const { data } = await supabase.auth.signInAnonymously();
    userId = data.user.id;

    // Load saved avatar
    const { data: av } = await supabase.from('avatars').select('data').eq('user_id', userId).single();
    if (av) avatarData = av.data;

    drawAvatar();
    document.getElementById('avatarScreen').classList.remove('hidden');
    document.getElementById('status').textContent = 'Connected • 1 free random event per day';
}
init();
</script>
</body>
</html>
