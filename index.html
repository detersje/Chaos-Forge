<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chaos Forge</title>
    <style>
        body { 
            margin: 0; 
            font-family: monospace; 
            background: #0a1f0a; /* GBA dark green tint */ 
            color: #9f9; /* Classic GBA green text */ 
            text-align: center; 
            overflow: hidden; 
        }
        #screen { 
            max-width: 100%; 
            margin: auto; 
            padding: 15px; 
            background: #112211; 
            min-height: 100vh; 
            box-shadow: 0 0 0 8px #0a1f0a inset; /* Screen bezel effect */ 
        }
        h1 { 
            font-size: 28px; 
            margin: 20px 0 15px; 
            text-shadow: 0 0 8px #0f0; 
            letter-spacing: 2px; 
        }
        button { 
            background: #1a331a; 
            color: #9f9; 
            border: 4px solid #4f4; 
            padding: 14px 20px; 
            margin: 10px auto; 
            font-size: 18px; 
            width: 88%; 
            max-width: 340px; 
            display: block; 
            font-weight: bold; 
        }
        button:active, button:focus { 
            background: #4f4; 
            color: #112; 
            border-color: #9f9; 
        }
        #menuStatus { 
            margin-top: 25px; 
            font-size: 15px; 
            color: #6c6; 
        }
        /* GBA-style subtle scanlines */
        #screen::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                transparent 0px,
                transparent 2px,
                rgba(0,0,0,0.08) 2px,
                rgba(0,0,0,0.08) 4px
            );
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
<div id="screen">
    <h1>CHAOS FORGE</h1>
    
    <!-- GBA Style Main Menu -->
    <div id="mainMenu">
        <button onclick="selectOption(1)">1. NEW GAME</button>
        <button onclick="selectOption(2)">2. LOAD GAME</button>
        <button onclick="selectOption(3)">3. FAST PLAY</button>
        <button onclick="selectOption(4)">4. SETTINGS</button>
        <button onclick="selectOption(5)">5. EXIT</button>
        
        <p id="menuStatus">SELECT YOUR PATH</p>
    </div>
</div>

<script>
// ============== GBA-STYLE MENU OPTIONS ==============
// Each block has space for future features
function selectOption(n) {
    const status = document.getElementById('menuStatus');
    
    if (n === 1) {
        status.textContent = 'NEW GAME → Starting fresh adventure...';
        // TODO: Add avatar creation + new game flow here
        alert('New Game selected');
    } 
    else if (n === 2) {
        status.textContent = 'LOAD GAME → Loading saved progress...';
        // TODO: Add save loading logic here
        alert('Load Game selected');
    } 
    else if (n === 3) {
        status.textContent = 'FAST PLAY → Daily 20-30 min chaos...';
        // TODO: Connect daily random events here later
        alert('Fast Play selected');
    } 
    else if (n === 4) {
        status.textContent = 'SETTINGS → Customize options...';
        // TODO: Add settings menu here
        alert('Settings selected');
    } 
    else if (n === 5) {
        if (confirm('Exit Chaos Forge?')) {
            window.close();
        }
    }
}

// ============== INIT ==============
console.log('Chaos Forge GBA-style menu ready');
</script>
</body>
</html>
