<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DreamForge</title>
    <style>
        body { margin:0; font-family: monospace; background:#111; color:#ff0; text-align:center; overflow:hidden; }
        #screen { max-width:100%; margin:auto; min-height:100vh; padding:20px; box-sizing:border-box; }
        .golden-brick { background:repeating-linear-gradient(45deg,#222 0px,#222 20px,#cc0 20px,#cc0 40px,#222 40px,#222 60px); border:8px solid #cc0; box-shadow:0 0 20px #ff0 inset; }
        h1 { font-size:42px; margin:30px 0 20px; text-shadow:0 0 15px #ff0; letter-spacing:4px; }
        button { background:#222; color:#ff0; border:6px solid #cc0; padding:16px 24px; margin:12px auto; font-size:19px; width:85%; max-width:340px; display:block; font-weight:bold; }
        button:active { background:#cc0; color:#111; transform:scale(0.95); }
        .hidden { display:none; }
        canvas { image-rendering:pixelated; border:6px solid #cc0; background:#111; display:block; margin:20px auto; }
    </style>
</head>
<body>
<div id="screen">

    <!-- Golden Brick Start -->
    <div id="startScreen" class="golden-brick">
        <h1>DREAMFORGE</h1>
        <p style="color:#ff0;font-size:18px;margin:30px 0;">ENTER THE FORGE</p>
        <button onclick="enterForge()" style="width:70%;">ENTER</button>
    </div>

    <!-- Main Menu -->
    <div id="mainMenu" class="hidden golden-brick">
        <h1>DREAMFORGE</h1>
        <button onclick="selectOption(1)">1. NEW GAME</button>
        <button onclick="selectOption(2)">2. LOAD GAME</button>
        <button onclick="selectOption(3)">3. FAST PLAY</button>
        <button onclick="selectOption(4)">4. SETTINGS</button>
        <button onclick="selectOption(5)">5. EXIT</button>
        <p id="menuStatus" style="margin-top:25px;color:#cc0;">CHOOSE YOUR PATH</p>
    </div>

    <!-- Avatar Creation -->
    <div id="avatarScreen" class="hidden golden-brick">
        <h1 style="font-size:28px;margin:15px 0;">CREATE YOUR AVATAR</h1>
        <canvas id="avatarCanvas" width="240" height="240"></canvas>
        
        <div style="margin:15px 0;">
            <button onclick="cyclePart('head')" style="width:45%;display:inline-block;">HEAD</button>
            <button onclick="cyclePart('body')" style="width:45%;display:inline-block;">BODY</button>
            <button onclick="cyclePart('feet')" style="width:45%;display:inline-block;">FEET</button>
            <button onclick="randomizeAvatar()" style="width:45%;display:inline-block;">RANDOMIZE</button>
        </div>
        
        <button onclick="saveAvatar()" style="background:#cc0;color:#111;border-color:#ff0;">SAVE AVATAR & CONTINUE</button>
        <button onclick="backToMenu()" style="background:#222;color:#ff0;">BACK TO MENU</button>
    </div>

</div>

<script>
// ============== STATE ==============
let currentDino = 0; // 0=green, 1=red, 2=yellow, 3=blue

const spriteSheet = new Image();
spriteSheet.src = "dino-sprites.png";   // ← your uploaded file

const canvas = document.getElementById('avatarCanvas');
const ctx = canvas.getContext('2d');

// Sprite positions (adjust if your sheet is different size)
const dinoPositions = [
    {x: 0, y: 0},   // green row
    {x: 0, y: 64},  // red row
    {x: 0, y: 128}, // yellow row
    {x: 0, y: 192}  // blue row
];

function drawAvatar() {
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, 240, 240);
    
    // Draw selected dino (scaled up nicely)
    ctx.drawImage(
        spriteSheet,
        dinoPositions[currentDino].x, dinoPositions[currentDino].y, 64, 64,   // source
        60, 60, 120, 120                                                        // destination
    );
}

spriteSheet.onload = () => {
    if (document.getElementById('avatarScreen').classList.contains('hidden') === false) {
        drawAvatar();
    }
};

// ============== CYCLE PARTS (using your sprite sheet rows) ==============
function cyclePart(part) {
    currentDino = (currentDino + 1) % 4;
    drawAvatar();
}

function randomizeAvatar() {
    currentDino = Math.floor(Math.random() * 4);
    drawAvatar();
}

function saveAvatar() {
    alert('✅ Avatar saved! (16-bit dino from your sprite sheet)');
    backToMenu();
}

function backToMenu() {
    document.getElementById('avatarScreen').classList.add('hidden');
    document.getElementById('mainMenu').classList.remove('hidden');
}

// ============== MENU FLOW ==============
function enterForge() {
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('mainMenu').classList.remove('hidden');
}

function selectOption(n) {
    if (n === 1) {
        document.getElementById('mainMenu').classList.add('hidden');
        document.getElementById('avatarScreen').classList.remove('hidden');
        drawAvatar();
    } else if (n === 5) {
        if (confirm('Exit DreamForge?')) window.close();
    } else {
        alert(`Option ${n} selected`);
    }
}
</script>
</body>
</html>
