<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chaos Forge</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            margin:0; 
            font-family: monospace; 
            background:#111; 
            color:#0f0; 
            text-align:center; 
            overflow-y:auto; 
        }
        #screen { 
            max-width:100%; 
            margin:auto; 
            padding:10px; 
        }
        button { 
            background:#222; 
            color:#0f0; 
            border:2px solid #0f0; 
            padding:12px 20px; 
            margin:8px; 
            font-size:18px; 
            width:90%; 
            max-width:320px; 
            cursor: pointer;
        }
        button:hover {
            background:#0f0;
            color:#111;
        }
        canvas { 
            image-rendering: pixelated; 
            border:2px solid #0f0; 
            background:#000; 
            max-width:100%; 
            touch-action: none; 
        }
        .hidden { display:none; }
        input { 
            background:#222; 
            color:#0f0; 
            border:2px solid #0f0; 
            padding:10px; 
            font-size:16px; 
            width:80%; 
        }
        #foundWords { 
            font-size:14px; 
            margin:10px; 
            text-align:left; 
            max-width:320px; 
            margin:auto; 
        }
        h1 { margin: 10px 0 5px; }
    </style>
</head>
<body>
<div id="screen">
    <h1>🔥 CHAOS FORGE 🔥</h1>
    <p>Truly Random Daily Break • 20-30 min</p>

    <!-- Avatar Screen -->
    <div id="avatarScreen">
        <h2>Customize Your Pixel Avatar</h2>
        <canvas id="avatarCanvas" width="160" height="160"></canvas><br>
        <button onclick="randomizeAvatar()">🎲 Randomize Avatar</button>
        <button onclick="saveAvatar()">💾 Save Avatar & Continue</button>
    </div>

    <!-- Main Menu -->
    <div id="mainMenu" class="hidden">
        <button onclick="startDailyEvent()">⚔️ Forge Today's Chaos</button>
        <button onclick="showAvatar()">👾 Customize Avatar</button>
        <button onclick="showPremium()">⭐ Go Premium (Unlimited Events)</button>
    </div>

    <!-- Game Container -->
    <div id="gameContainer" class="hidden">
        <h2 id="eventTitle"></h2>
        <canvas id="gameCanvas" width="320" height="380"></canvas>
        <div id="gameUI"></div>
        <button onclick="endEvent()">End Event & Return</button>
    </div>

    <p id="status"></p>
</div>

<script>
// ============== SUPABASE CONFIG (safe mode) ==============
const SUPABASE_URL = 'https://rsswlyvuypjcwjbijvmk.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJzc3dseXZ1eXBqY3dqYmlqdm1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NTk1ODgsImV4cCI6MjA5MDUzNTU4OH0.kkftjqq-SouvplCuCSXufMysioQUPrCRuDPaGj17IgE';

let supabase;
try {
    supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
} catch (e) {
    console.error("Supabase failed to initialize:", e);
    supabase = null;
}

// ============== GLOBAL STATE ==============
let userId = null;
let avatarData = { 
    headColor: '#fdb', 
    bodyColor: '#0f0', 
    hat: 1 
};

// ============== AVATAR ==============
const avCanvas = document.getElementById('avatarCanvas');
const avCtx = avCanvas.getContext('2d', { alpha: true });

function drawAvatar() {
    avCtx.fillStyle = '#000'; 
    avCtx.fillRect(0, 0, 160, 160);
    
    // Head
    avCtx.fillStyle = avatarData.headColor; 
    avCtx.fillRect(56, 32, 48, 48);
    
    // Body
    avCtx.fillStyle = avatarData.bodyColor; 
    avCtx.fillRect(48, 80, 64, 64);
    
    // Eyes
    avCtx.fillStyle = '#000'; 
    avCtx.fillRect(68, 48, 8, 12); 
    avCtx.fillRect(84, 48, 8, 12);
    
    // Mouth
    avCtx.fillStyle = '#000';
    avCtx.fillRect(72, 65, 16, 4);
    
    // Hat
    if (avatarData.hat) {
        avCtx.fillStyle = '#f00'; 
        avCtx.fillRect(48, 20, 64, 20);
        avCtx.fillStyle = '#ff0';
        avCtx.fillRect(60, 15, 40, 8);
    }
    
    console.log('Avatar drawn:', avatarData);
}

function randomizeAvatar() {
    avatarData.headColor = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');
    avatarData.bodyColor = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');
    avatarData.hat = Math.random() > 0.3 ? 1 : 0;
    drawAvatar();
    console.log('🌀 Avatar randomized!');
}

async function saveAvatar() {
    console.log('💾 Saving avatar...');
    
    if (!userId && supabase) {
        try {
            const { data, error } = await supabase.auth.signInAnonymously();
            if (error) throw error;
            userId = data.user.id;
            console.log('✅ Anonymous user:', userId);
        } catch (e) {
            console.warn('Supabase sign-in skipped:', e.message);
            userId = 'local-test-' + Date.now();
        }
    }
    
    alert('✅ Avatar saved! (Supabase optional for now)');
    
    document.getElementById('avatarScreen').classList.add('hidden');
    document.getElementById('mainMenu').classList.remove('hidden');
    drawAvatar();
}

// ============== DAILY EVENT LOGIC (unchanged for now) ==============
const eventTypes = [
    {name: "Sudoku", time: "20 min", fn: startSudoku},
    {name: "Word Find", time: "20-25 min", fn: startWordFind},
    {name: "RPG Battle", time: "20 min", fn: startRPGBattle},
    {name: "Slice of Life", time: "25 min", fn: startStory},
    {name: "Skill Lesson", time: "15 min", fn: startSkill},
    {name: "Riddle", time: "15 min", fn: startRiddle},
    {name: "Language Flash", time: "20 min", fn: startLanguage},
    {name: "Meme Match", time: "15 min", fn: startMeme},
    {name: "Funny Game", time: "20 min", fn: startFunnyGame}
];

async function startDailyEvent() {
    if (!userId && supabase) {
        try {
            const { data } = await supabase.auth.signInAnonymously();
            userId = data.user.id;
        } catch (e) {
            userId = 'local-test-' + Date.now();
        }
    }

    document.getElementById('mainMenu').classList.add('hidden');
    document.getElementById('gameContainer').classList.remove('hidden');
    
    // For testing: always pick Word Find first
    const chosen = eventTypes.find(e => e.name === "Word Find") || eventTypes[0];
    
    document.getElementById('eventTitle').textContent = `${chosen.name} • ${chosen.time}`;
    document.getElementById('gameUI').innerHTML = '';
    chosen.fn();
}

// ============== MINI GAMES (Word Find kept fully working) ==============
let wordFindGrid = [];
let wordFindWords = ["CHAOS","FORGE","PIXEL","AVATAR","DAILY","RANDOM","PUZZLE","BREAK","QUEST","GAME"];
let foundWords = [];
let selectedCells = [];

function startWordFind() {
    wordFindGrid = [
        ['E','C','H','A','O','S','J','B','Z','X'],
        ['S','O','B','D','A','I','L','Y','D','K'],
        ['M','J','N','F','O','R','G','E','J','N'],
        ['X','Q','U','E','S','T','V','Y','R','P'],
        ['Z','V','G','A','M','E','Y','F','Q','P'],
        ['K','M','Q','A','V','A','T','A','R','D'],
        ['K','R','A','N','D','O','M','W','T','I'],
        ['V','G','K','P','I','X','E','L','R','Y'],
        ['B','R','E','A','K','Q','S','X','B','F'],
        ['W','P','U','Z','Z','L','E','P','B','M']
    ];

    foundWords = [];
    selectedCells = [];
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const cellSize = 32;

    function drawGrid() {
        ctx.fillStyle = '#000'; ctx.fillRect(0,0,320,380);
        ctx.strokeStyle = '#0f0'; ctx.lineWidth = 2;
        for (let r = 0; r < 10; r++) {
            for (let c = 0; c < 10; c++) {
                ctx.strokeRect(c*cellSize, r*cellSize, cellSize, cellSize);
                ctx.fillStyle = '#0f0';
                ctx.font = 'bold 22px monospace';
                ctx.fillText(wordFindGrid[r][c], c*cellSize + 8, r*cellSize + 24);
            }
        }
        document.getElementById('gameUI').innerHTML = `
            <div id="foundWords">Found: ${foundWords.join(', ') || 'None yet'}</div>
            <p>Drag across letters to find words (horizontal or vertical only).</p>
        `;
    }

    drawGrid();

    let isDragging = false;
    let startRow = -1, startCol = -1;

    canvas.addEventListener('touchstart', (e) => {
        isDragging = true;
        const rect = canvas.getBoundingClientRect();
        const x = e.touches[0].clientX - rect.left;
        const y = e.touches[0].clientY - rect.top;
        startCol = Math.floor(x / cellSize);
        startRow = Math.floor(y / cellSize);
        selectedCells = [];
    });

    canvas.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        const rect = canvas.getBoundingClientRect();
        const x = e.touches[0].clientX - rect.left;
        const y = e.touches[0].clientY - rect.top;
        const col = Math.floor(x / cellSize);
        const row = Math.floor(y / cellSize);

        if (row >= 0 && row < 10 && col >= 0 && col < 10) {
            if (row === startRow || col === startCol) {
                selectedCells = [];
                if (row === startRow) {
                    const minC = Math.min(startCol, col);
                    const maxC = Math.max(startCol, col);
                    for (let c = minC; c <= maxC; c++) selectedCells.push({r:row, c:c});
                } else if (col === startCol) {
                    const minR = Math.min(startRow, row);
                    const maxR = Math.max(startRow, row);
                    for (let r = minR; r <= maxR; r++) selectedCells.push({r:r, c:col});
                }
            }
        }
    });

    canvas.addEventListener('touchend', () => {
        isDragging = false;
        if (selectedCells.length > 2) {
            let word = '';
            selectedCells.forEach(cell => word += wordFindGrid[cell.r][cell.c]);
            const reverseWord = word.split('').reverse().join('');
            if (wordFindWords.includes(word) || wordFindWords.includes(reverseWord)) {
                const foundWord = wordFindWords.includes(word) ? word : reverseWord;
                if (!foundWords.includes(foundWord)) {
                    foundWords.push(foundWord);
                    alert(`Found: ${foundWord}!`);
                    document.getElementById('foundWords').textContent = `Found: ${foundWords.join(', ')}`;
                    if (foundWords.length === wordFindWords.length) {
                        alert('🎉 Congratulations! You found all words!');
                    }
                }
            }
        }
        selectedCells = [];
    });
}

// ============== PLACEHOLDER MINI GAMES ==============
function startSudoku() {
    const ctx = document.getElementById('gameCanvas').getContext('2d');
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,320,380);
    ctx.strokeStyle = '#0f0'; ctx.lineWidth = 3;
    for (let i = 0; i <= 9; i++) {
        ctx.beginPath();
        ctx.moveTo(20 + i*30, 20); ctx.lineTo(20 + i*30, 290);
        ctx.moveTo(20, 20 + i*30); ctx.lineTo(290, 20 + i*30);
        ctx.stroke();
    }
    ctx.fillStyle = '#0f0'; ctx.font = 'bold 18px monospace';
    ctx.fillText('Sudoku Demo', 80, 180);
    document.getElementById('gameUI').innerHTML = '<p>Grid ready. Full version coming soon!</p>';
}

function startRPGBattle() {
    const ctx = document.getElementById('gameCanvas').getContext('2d');
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,320,380);
    ctx.fillStyle = avatarData.bodyColor; ctx.fillRect(80,180,50,70);
    ctx.fillStyle = avatarData.headColor; ctx.fillRect(88,140,34,40);
    ctx.fillStyle = '#f33'; ctx.fillRect(200,160,60,60);
    document.getElementById('gameUI').innerHTML = `<p>Your avatar is ready to battle!</p>`;
}

function startRiddle() {
    document.getElementById('gameUI').innerHTML = `
        <p>What has keys but can't open locks?</p>
        <input type="text" id="riddleAnswer" placeholder="Answer">
        <button onclick="checkRiddle()">Submit</button>
    `;
}
window.checkRiddle = function() {
    const ans = document.getElementById('riddleAnswer').value.toLowerCase();
    if (ans.includes('piano') || ans.includes('keyboard')) alert('Correct!');
    else alert('Try again.');
};

function startStory(){ document.getElementById('gameUI').innerHTML = '<p>Story mode loading... 🧙</p>'; }
function startSkill(){ document.getElementById('gameUI').innerHTML = '<p>Skill lesson + quiz incoming</p>'; }
function startLanguage(){ document.getElementById('gameUI').innerHTML = '<p>Language cards</p>'; }
function startMeme(){ document.getElementById('gameUI').innerHTML = '<p>Meme match</p>'; }
function startFunnyGame(){ document.getElementById('gameUI').innerHTML = '<p>Chaos tap game</p>'; }

// ============== UTILS ==============
function endEvent() {
    document.getElementById('gameContainer').classList.add('hidden');
    document.getElementById('mainMenu').classList.remove('hidden');
    document.getElementById('status').textContent = 'Progress saved • New event tomorrow!';
}

function showAvatar() {
    document.getElementById('mainMenu').classList.add('hidden');
    document.getElementById('avatarScreen').classList.remove('hidden');
    drawAvatar();
}

function showPremium() {
    alert('Premium: $4.99/month or $29 one-time • Unlimited dungeons coming soon!');
}

// ============== INIT ==============
async function init() {
    console.log('🚀 Chaos Forge initializing...');
    
    drawAvatar();                                 // Show avatar immediately
    document.getElementById('avatarScreen').classList.remove('hidden');
    
    // Try Supabase in background (non-blocking)
    if (supabase) {
        try {
            const { data } = await supabase.auth.signInAnonymously();
            if (data?.user) userId = data.user.id;
        } catch (e) {
            console.warn('Supabase auth skipped (local testing OK)');
            userId = 'local-test-' + Date.now();
        }
    }
    
    document.getElementById('status').textContent = '✅ Avatar fixed • Click Randomize & Save!';
}

init();
</script>
</body>
</html>
