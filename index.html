<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DreamForge</title>
    <style>
        body { 
            margin: 0; 
            font-family: monospace; 
            background: #111; 
            color: #ff0; 
            text-align: center; 
            overflow: hidden; 
        }
        #screen { 
            max-width: 100%; 
            margin: auto; 
            min-height: 100vh; 
            padding: 20px; 
            box-sizing: border-box; 
        }

        /* Golden Brick Background */
        .golden-brick {
            background: repeating-linear-gradient(
                45deg,
                #222 0px,
                #222 20px,
                #cc0 20px,
                #cc0 40px,
                #222 40px,
                #222 60px
            );
            border: 8px solid #cc0;
            box-shadow: 0 0 20px #ff0 inset;
        }

        h1 {
            font-size: 42px;
            margin: 40px 0 20px;
            text-shadow: 0 0 15px #ff0, 0 0 25px #cc0;
            letter-spacing: 4px;
            color: #ff0;
        }

        button {
            background: #222;
            color: #ff0;
            border: 6px solid #cc0;
            padding: 18px 30px;
            margin: 15px auto;
            font-size: 20px;
            font-weight: bold;
            width: 85%;
            max-width: 340px;
            display: block;
            box-shadow: 0 0 15px #ff0;
        }
        button:active {
            background: #cc0;
            color: #111;
            transform: scale(0.95);
        }

        .hidden { display: none; }
    </style>
</head>
<body>
<div id="screen">

    <!-- Start Screen - Golden Bricks -->
    <div id="startScreen" class="golden-brick">
        <h1>DREAMFORGE</h1>
        <p style="color:#ff0; font-size:18px; margin-top:30px;">ENTER THE FORGE</p>
        
        <!-- Bottom Center Button -->
        <button onclick="enterForge()" style="position:absolute; bottom:40px; left:50%; transform:translateX(-50%); width:70%;">
            ENTER
        </button>
    </div>

    <!-- Second Screen - Black & Gold Menu -->
    <div id="mainMenu" class="hidden golden-brick">
        <h1>DREAMFORGE</h1>
        
        <button onclick="selectOption(1)">1. NEW GAME</button>
        <button onclick="selectOption(2)">2. LOAD GAME</button>
        <button onclick="selectOption(3)">3. FAST PLAY</button>
        <button onclick="selectOption(4)">4. SETTINGS</button>
        <button onclick="selectOption(5)">5. EXIT</button>
        
        <p id="menuStatus" style="margin-top:30px; color:#cc0; font-size:16px;">CHOOSE YOUR PATH</p>
    </div>

</div>

<script>
function enterForge() {
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('mainMenu').classList.remove('hidden');
}

function selectOption(n) {
    const status = document.getElementById('menuStatus');
    
    if (n === 1) status.textContent = 'NEW GAME selected';
    else if (n === 2) status.textContent = 'LOAD GAME selected';
    else if (n === 3) status.textContent = 'FAST PLAY selected';
    else if (n === 4) status.textContent = 'SETTINGS selected';
    else if (n === 5) {
        if (confirm('Exit DreamForge?')) window.close();
        return;
    }
    
    alert(`Option ${n} selected`);
}
</script>
</body>
</html>
