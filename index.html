<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chaos Forge</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin:0; font-family: monospace; background:#111; color:#0f0; text-align:center; overflow:hidden; }
        canvas { image-rendering: pixelated; border:4px solid #0f0; background:#000; display:block; margin:0 auto; }
        button { background:#222; color:#0f0; border:3px solid #0f0; padding:15px 25px; margin:12px; font-size:19px; width:85%; max-width:340px; }
        button:active { background:#0f0; color:#111; transform: scale(0.96); }
        .hidden { display:none; }
        h1 { margin:15px 0 8px; font-size:32px; text-shadow: 0 0 12px #0f0; }
    </style>
</head>
<body>
<div id="screen">

    <!-- 8-Bit Medieval Intro (10 seconds) -->
    <div id="introScreen">
        <h1>CHAOS FORGE</h1>
        <canvas id="introCanvas" width="320" height="240"></canvas>
        <p style="margin-top:8px; font-size:14px;">MEDIEVAL CHAOS FORGE v1.0</p>
    </div>

    <!-- Main Menu -->
    <div id="mainMenu" class="hidden">
        <h1>CHAOS FORGE</h1>
        <canvas id="menuCanvas" width="320" height="90"></canvas>
        
        <button onclick="selectOption(1)">1. NEW GAME</button>
        <button onclick="selectOption(2)">2. LOAD GAME</button>
        <button onclick="selectOption(3)">3. FAST PLAY (Daily Chaos)</button>
        <button onclick="selectOption(4)">4. SETTINGS (TBD)</button>
        <button onclick="selectOption(5)">5. EXIT</button>
        
        <p id="menuStatus" style="margin-top:15px; font-size:15px;">Choose your path, adventurer</p>
    </div>

</div>

<script>
// ============== SUPABASE (non-blocking) ==============
const SUPABASE_URL = 'https://rsswlyvuypjcwjbijvmk.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJzc3dseXZ1eXBqY3dqYmlqdm1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NTk1ODgsImV4cCI6MjA5MDUzNTU4OH0.kkftjqq-SouvplCuCSXufMysioQUPrCRuDPaGj17IgE';
let supabase;
try { supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); } 
catch(e) { console.warn("Supabase offline"); }

// ============== 8-BIT MEDIEVAL INTRO ==============
const introCanvas = document.getElementById('introCanvas');
const introCtx = introCanvas.getContext('2d');

function drawIntro() {
    introCtx.fillStyle = '#000'; introCtx.fillRect(0,0,320,240);
    
    // Stone background texture
    introCtx.fillStyle = '#331';
    for (let i = 0; i < 240; i += 12) {
        introCtx.fillRect(0, i, 320, 4);
    }
    
    // Castle towers
    introCtx.fillStyle = '#555';
    introCtx.fillRect(40, 80, 40, 120);
    introCtx.fillRect(240, 80, 40, 120);
    introCtx.fillStyle = '#777';
    introCtx.fillRect(30, 60, 60, 30);
    introCtx.fillRect(230, 60, 60, 30);
    
    // Big "CHAOS FORGE" banner
    introCtx.fillStyle = '#fc0';
    introCtx.font = 'bold 26px monospace';
    introCtx.fillText('CHAOS', 72, 95);
    introCtx.fillText('FORGE', 78, 125);
    
    // Sword (medieval centerpiece)
    introCtx.strokeStyle = '#ccc'; introCtx.lineWidth = 12;
    introCtx.beginPath(); introCtx.moveTo(160, 160); introCtx.lineTo(160, 220); introCtx.stroke();
    introCtx.fillStyle = '#f33';
    introCtx.fillRect(145, 145, 30, 20); // hilt
    
    // Flame effect at base of forge
    introCtx.fillStyle = '#f80';
    introCtx.fillRect(140, 225, 40, 12);
}

function startIntro() {
    drawIntro();
    setTimeout(() => {
        document.getElementById('introScreen').classList.add('hidden');
        document.getElementById('mainMenu').classList.remove('hidden');
        drawMenuCanvas();
    }, 10000); // exactly 10 seconds
}

// ============== MAIN MENU CANVAS (Medieval Shield Style) ==============
const menuCanvas = document.getElementById('menuCanvas');
const menuCtx = menuCanvas.getContext('2d');

function drawMenuCanvas() {
    menuCtx.fillStyle = '#000'; menuCtx.fillRect(0,0,320,90);
    
    // Shield border
    menuCtx.strokeStyle = '#fc0'; menuCtx.lineWidth = 6;
    menuCtx.strokeRect(25, 10, 270, 70);
    
    // Inner glow
    menuCtx.strokeStyle = '#0f0'; menuCtx.lineWidth = 3;
    menuCtx.strokeRect(35, 18, 250, 54);
    
    menuCtx.fillStyle = '#0f0';
    menuCtx.font = 'bold 24px monospace';
    menuCtx.fillText('MAIN FORGE', 68, 52);
}

// ============== MENU OPTIONS (Plenty of space for expansion) ==============
function selectOption(n) {
    const status = document.getElementById('menuStatus');
    
    if (n === 1) {
        status.textContent = '1. NEW GAME - Area ready for full game code';
        // TODO: Insert new game logic here (avatar creation, story start, etc.)
        alert('New Game selected - Expand this block');
    } 
    else if (n === 2) {
        status.textContent = '2. LOAD GAME - Area ready for save loading';
        alert('Load Game selected');
    } 
    else if (n === 3) {
        status.textContent = '3. FAST PLAY - Daily random chaos events';
        // TODO: Connect to your random daily events + avatar here
        alert('Fast Play selected - This will become your 20-30 min daily mode');
    } 
    else if (n === 4) {
        status.textContent = '4. SETTINGS (TBD) - Area ready';
        alert('Option 4 selected');
    } 
    else if (n === 5) {
        if (confirm('Exit Chaos Forge?')) {
            window.close();
        }
    }
}

// ============== INIT ==============
function init() {
    startIntro();   // 10-second medieval intro then menu
}
init();
</script>
</body>
</html>
